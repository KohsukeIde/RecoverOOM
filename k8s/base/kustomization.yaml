apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: recoveroom

commonLabels:
  app: recoveroom-api

resources:
- namespace.yaml
- deployment.yaml
- sa.yaml
- clusterrolebinding.yaml

replicas:
- name: recoveroom-api
  count: 0

configurations:
- varreference.yaml

configmapGenerator:
- name: "recoveroom-setting"
  namespace: recoveroom
  literals:
  - ENV=TO_BE_SPECIFIED
  - DOMAIN=TO_BE_SPECIFIED

vars:
- name: ENV
  objref:
    apiVersion: v1
    kind: ConfigMap
    name: "recoveroom-setting"
  fieldref:
    fieldpath: data.ENV
- name: DOMAIN
  objref:
    apiVersion: v1
    kind: ConfigMap
    name: "recoveroom-setting"
  fieldref:
    fieldpath: data.DOMAIN
